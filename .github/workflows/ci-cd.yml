name: CI-CD

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Test Go API
        run: |
          cd backend/go-api
          go test ./...

      - name: Build Docker images
        run: |
          docker build -f docker/Dockerfile.backend -t aws-retailops-backend:ci .
          docker build -f docker/Dockerfile.frontend -t aws-retailops-frontend:ci .

  cd:
    if: github.ref == 'refs/heads/main'
    needs: ci
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Deploy placeholder
        run: echo "Add terraform apply and kubectl apply commands here"
