services:
  backend:
    build:
      context: .
      dockerfile: docker/Dockerfile.backend
    container_name: aws-retailops-backend
    ports:
      - "8080:8080"

  frontend:
    build:
      context: .
      dockerfile: docker/Dockerfile.frontend
    container_name: aws-retailops-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
